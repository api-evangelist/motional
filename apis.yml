aid: motional
name: Motional
description: >-
  Motional is a Boston-headquartered autonomous-vehicle company formed as a
  joint venture between Hyundai Motor Group and Aptiv. Its core product is an
  all-electric IONIQ 5 robotaxi built on a Hyundai E-GMP platform with
  Motional's full Level 4 autonomous driving stack and a sensor suite including
  lidar, radar, and cameras. Motional operates commercial robotaxi service in
  Las Vegas in partnership with Uber, Uber Eats, and Lyft, with additional
  operations in Boston, Pittsburgh, Santa Monica, Singapore, and Seoul. The
  company's most influential developer artifact is nuScenes, the open
  large-scale multimodal autonomous-driving dataset originally released by
  nuTonomy (a Motional predecessor), now a de facto benchmark for 3D
  perception research. Motional also publishes the nuscenes-devkit Python
  library and AVCDL cybersecurity development lifecycle materials on GitHub.
  Motional does not publish a traditional public developer API; the developer
  surface is research-dataset access plus open-source devkits.
